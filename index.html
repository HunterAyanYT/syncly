<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syncly | Pro API Mode</title>
    <style>
        :root { --p: #1DB954; --bg: #0b0b0b; --brd: #282828; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .player-side { flex: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-right: 1px solid var(--brd); }
        .search-area { width: 90%; max-width: 700px; display: flex; gap: 10px; margin-bottom: 25px; }
        input { background: #1e1e1e; border: 1px solid var(--brd); padding: 12px; color: white; border-radius: 8px; flex: 1; outline: none; }
        .btn { background: var(--p); border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
        .video-box { width: 95%; aspect-ratio: 16/9; background: #000; border-radius: 15px; border: 1px solid var(--brd); overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #status { margin-top: 15px; color: var(--p); font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="player-side">
        <div class="search-area">
            <input type="text" id="query" placeholder="Search Seedhe Maut, Talwiinder, etc...">
            <button class="btn" onclick="proSearch()">PLAY</button>
        </div>
        <div class="video-box">
            <iframe id="main-player" src="https://www.youtube.com/embed/jOTfBlKSQ84?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <p id="status">PRO ENGINE ACTIVE</p>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyAaCRqzXizB5wt8iFc7O-yfFvherdJi_-I'; // <--- APNI KEY YAHAN DAAL BHAI

    async function proSearch() {
        let val = document.getElementById('query').value.trim();
        let frame = document.getElementById('main-player');
        let status = document.getElementById('status');

        if(!val) return;

        // Check if it's a direct link
        let vidId = val.match(/(?:https?:\/{2})?(?:w{3}\.)?youtu(?:be)?\.(?:com|be)(?:\/watch\?v=|\/)([^\s&]+)/);
        
        if(vidId && vidId[1]) {
            frame.src = `https://www.youtube.com/embed/${vidId[1]}?autoplay=1`;
            status.innerText = "Playing via Link";
        } else {
            status.innerText = "Searching YouTube Database...";
            try {
                // Real API Fetch
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(val)}&type=video&key=${API_KEY}`);
                const data = await response.json();

                if(data.items && data.items.length > 0) {
                    let newId = data.items[0].id.videoId;
                    frame.src = `https://www.youtube.com/embed/${newId}?autoplay=1`;
                    status.innerText = "Now Playing: " + data.items[0].snippet.title;
                } else {
                    status.innerText = "No results found!";
                }
            } catch (error) {
                status.innerText = "API Error! Check your Key.";
                console.error(error);
            }
        }
        document.getElementById('query').value = "";
    }
</script>
</body>
</html>
