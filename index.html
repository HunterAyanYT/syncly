<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syncly | No-Tab Search Mode</title>
    <style>
        :root { --p: #1DB954; --bg: #0b0b0b; --brd: #282828; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .player-side { flex: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-right: 1px solid var(--brd); }
        .search-area { width: 90%; max-width: 700px; display: flex; gap: 10px; margin-bottom: 25px; }
        input { background: #1e1e1e; border: 1px solid var(--brd); padding: 12px; color: white; border-radius: 8px; flex: 1; outline: none; }
        input:focus { border-color: var(--p); }
        .btn { background: var(--p); border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
        .video-box { width: 95%; aspect-ratio: 16/9; background: #000; border-radius: 15px; border: 1px solid var(--brd); overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #status { margin-top: 15px; color: var(--p); font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="player-side">
        <div class="search-area">
            <input type="text" id="target" placeholder="Type Song Name (e.g. Seedhe Maut Luka Chippi)...">
            <button class="btn" onclick="synclySearch()">PLAY</button>
        </div>
        <div class="video-box">
            <iframe id="main-frame" src="https://www.youtube.com/embed/jOTfBlKSQ84?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <p id="status">Syncly Engine: Ready</p>
    </div>
</div>

<script>
    function synclySearch() {
        let val = document.getElementById('target').value.trim();
        let frame = document.getElementById('main-frame');
        let status = document.getElementById('status');

        if(!val) return;

        // Step 1: Check if it's a direct link
        let vidId = extractID(val);

        if(vidId) {
            frame.src = `https://www.youtube.com/embed/${vidId}?autoplay=1&rel=0&showinfo=0`;
            status.innerText = "Playing via Link...";
        } else {
            // Step 2: The "Ghost Search" Logic
            // Hum embed URL ko search parameter ke saath force karenge
            // Isse YouTube ka embed player search result ko pehla video samajh kar play karega
            frame.src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(val)}&autoplay=1`;
            status.innerText = "Searching for: " + val;
        }
        
        document.getElementById('target').value = "";
    }

    function extractID(url) {
        let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        let match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : null;
    }
</script>
</body>
</html>
