<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncly | Final Fix</title>
    <style>
        :root { --p: #1DB954; --bg: #0b0b0b; --panel: #121212; --brd: #282828; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .player-side { flex: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-right: 1px solid var(--brd); }
        .search-bar { width: 90%; max-width: 700px; display: flex; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { flex: 1; background: #1e1e1e; border: 1px solid var(--brd); padding: 12px 15px; color: white; border-radius: 8px; outline: none; }
        .btn { background: var(--p); color: black; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .video-box { width: 95%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--brd); }
        #player-frame { width: 100%; height: 100%; border: none; }
        .chat-side { flex: 1; background: var(--panel); display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div class="container">
        <div class="player-side">
            <div class="search-bar">
                <input type="text" id="target" placeholder="Type Song Name (e.g. Seedhe Maut) or Paste Link...">
                <button class="btn" onclick="masterPlay()">PLAY</button>
            </div>
            <div class="video-box">
                <iframe id="player-frame" src="https://www.youtube.com/embed/jOTfBlKSQ84?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <div id="status" style="margin-top: 15px; color: var(--p);">SYSTEM LIVE</div>
        </div>

        <div class="chat-side">
            <div style="padding:20px; border-bottom:1px solid var(--brd); color: var(--p);">LIVE CHAT</div>
            <div id="msgs" style="flex:1; padding:15px; overflow-y:auto;"></div>
            <div style="padding:20px; display:flex; gap:5px;">
                <input type="text" id="msg" placeholder="Chat..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()">></button>
            </div>
        </div>
    </div>

    <script>
        function masterPlay() {
            let val = document.getElementById('target').value.trim();
            let frame = document.getElementById('player-frame');
            if(!val) return;

            let videoId = "";
            // Check for Link
            if(val.includes("v=")) videoId = val.split("v=")[1].split("&")[0];
            else if(val.includes("youtu.be/")) videoId = val.split("/").pop().split("?")[0];

            if(videoId) {
                // Link Mode
                frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            } else {
                // Name Search Fix: We use the Google Search Redirect trick
                // This bypasses the restricted Search API on free hosting
                frame.src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(val)}&autoplay=1`;
            }
            document.getElementById('target').value = "";
        }

        function send() {
            let i = document.getElementById('msg');
            if(i.value) {
                document.getElementById('msgs').innerHTML += `<div style="margin-bottom:8px;"><b>You:</b> ${i.value}</div>`;
                i.value = "";
            }
        }
    </script>
</body>
</html>
